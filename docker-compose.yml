services:
  poker:
    build: .
    image: planning-poker
    container_name: planning-poker
    ports:
      - "8000:80"
    # Bind-mount the whole project read-only so you can add, edit, or delete
    # files and just refresh the browser - no rebuild and no compose edit needed.
    # Remove this block to run purely from the image baked at build time.
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped
